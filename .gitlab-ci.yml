image: elixir:1.19-otp-28-slim

stages:
  - setup
  - validate
  - sync
  - publish

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

.elixir_cache: &elixir_cache
  key:
    files:
      - mix.lock
  paths:
    - deps/
    - _build/

default:
  before_script:
    - apt-get update -qq && apt-get install -y -qq git build-essential
    - mix local.hex --force --quiet
    - mix local.rebar --force --quiet

deps:
  stage: setup
  cache:
    <<: *elixir_cache
    policy: pull-push
  script:
    - mix deps.get
    - MIX_ENV=dev mix deps.compile
    - MIX_ENV=test mix deps.compile
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

lint:
  stage: validate
  needs: [deps]
  cache:
    <<: *elixir_cache
    policy: pull
  script:
    - mix lint.ci
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test:
  stage: validate
  needs: [deps]
  cache:
    <<: *elixir_cache
    policy: pull
  services:
    - name: postgres:16-alpine
      alias: postgres
  variables:
    MIX_ENV: test
    DB_HOST: postgres
    DB_USER: postgres
    DB_PASS: postgres
    DB_NAME: holter
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
  script:
    - mix test.ci
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

sync-github:
  stage: sync
  image: alpine:3
  variables:
    GIT_DEPTH: "0"
  before_script:
    - apk add --no-cache git
  script:
    - git remote add github "https://x-access-token:${GITHUB_TOKEN}@github.com/eiseron/holter.git"
    - git push github HEAD:main --tags
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

publish-docs:
  stage: publish
  image: alpine:3
  variables:
    GIT_DEPTH: "0"
  before_script:
    - apk add --no-cache git jq
  script:
    - VERSION="v$(echo "$CI_COMMIT_TAG" | sed 's/^v\([0-9]*\.[0-9]*\)\.[0-9]*/\1/')"
    - git clone "https://oauth2:${GITLAB_TOKEN}@gitlab.com/eiseron/holter/holter-docs.git" /tmp/holter-docs
    - cd /tmp/holter-docs
    - cp -r "$CI_PROJECT_DIR/docs/en/." src/
    # Update latest PT BR docs
    - rm -rf src/pt_BR
    - mkdir -p src/pt_BR
    - cp -r "$CI_PROJECT_DIR/docs/pt_BR/." src/pt_BR/
    # Freeze versioned snapshot
    - mkdir -p "src/$VERSION/pt_BR"
    - cp -r "$CI_PROJECT_DIR/docs/en/." "src/$VERSION/"
    - cp -r "$CI_PROJECT_DIR/docs/pt_BR/." "src/$VERSION/pt_BR/"
    # Update versions.json
    - jq --arg v "$VERSION" '. += [$v] | unique' versions.json > /tmp/v.json
    - mv /tmp/v.json versions.json
    # Commit and push
    - git config user.email "ci@holter.dev"
    - git config user.name "Holter CI"
    - git add -A
    - "git diff --cached --quiet || git commit -m \"chore: freeze docs for $CI_COMMIT_TAG\""
    - git push origin main
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
