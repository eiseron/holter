info:
  description: API for notification channel management and alert dispatch.
  title: Holter Delivery API
  version: 1.0.0
openapi: 3.0.0
paths:
  /api/v1/email_channels/{email_channel_id}/anti_phishing_code:
    put:
      callbacks: {}
      description: Generate a fresh anti-phishing code. The next email through this channel will carry the new value.
      operationId: HolterWeb.Api.EmailChannelController.rotate_anti_phishing_code
      parameters:
        - description: Email channel UUID
          in: path
          name: email_channel_id
          required: true
          schema:
            format: uuid
            type: string
            x-struct:
            x-validate:
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Single email channel response.
                properties:
                  data:
                    additionalProperties: false
                    description: An email delivery channel.
                    properties:
                      address:
                        type: string
                        x-struct:
                        x-validate:
                      anti_phishing_code:
                        description: Visual anti-phishing code printed in every email. Rotate via PUT /api/v1/email_channels/:id/anti_phishing_code.
                        type: string
                        x-struct:
                        x-validate:
                      id:
                        format: uuid
                        type: string
                        x-struct:
                        x-validate:
                      inserted_at:
                        format: date-time
                        type: string
                        x-struct:
                        x-validate:
                      last_test_dispatched_at:
                        description: Timestamp of the most recent test ping. Used for cooldown gating.
                        format: date-time
                        nullable: true
                        type: string
                        x-struct:
                        x-validate:
                      name:
                        type: string
                        x-struct:
                        x-validate:
                      settings:
                        additionalProperties: true
                        type: object
                        x-struct:
                        x-validate:
                      updated_at:
                        format: date-time
                        type: string
                        x-struct:
                        x-validate:
                      verified_at:
                        description: Timestamp the address was verified. `null` while pending — alerts to the primary address are blocked until this is set.
                        format: date-time
                        nullable: true
                        type: string
                        x-struct:
                        x-validate:
                      workspace_id:
                        format: uuid
                        type: string
                        x-struct:
                        x-validate:
                    required:
                      - id
                      - workspace_id
                      - name
                      - address
                      - settings
                      - anti_phishing_code
                      - verified_at
                      - last_test_dispatched_at
                      - inserted_at
                      - updated_at
                    title: EmailChannel
                    type: object
                    x-struct:
                    x-validate:
                required:
                  - data
                title: EmailChannelResponse
                type: object
                x-struct:
                x-validate:
          description: Channel with rotated anti_phishing_code
        '404':
          content:
            application/json:
              schema:
                properties:
                  error:
                    properties:
                      code:
                        type: string
                        x-struct:
                        x-validate:
                      message:
                        type: string
                        x-struct:
                        x-validate:
                    type: object
                    x-struct:
                    x-validate:
                title: Error
                type: object
                x-struct:
                x-validate:
          description: Channel not found
      summary: Rotate the anti-phishing code
      tags:
        - Email Channels
  /api/v1/email_channels/{email_channel_id}/delivery_logs:
    get:
      callbacks: {}
      description: List delivery job logs for a webhook or email channel with pagination and filtering.
      operationId: HolterWeb.Api.DeliveryLogController.index
      parameters:
        - description: Webhook channel UUID (when listing logs under /webhook_channels)
          in: path
          name: webhook_channel_id
          required: false
          schema:
            format: uuid
            type: string
            x-struct:
            x-validate:
        - description: Email channel UUID (when listing logs under /email_channels)
          in: path
          name: email_channel_id
          required: false
          schema:
            format: uuid
            type: string
            x-struct:
            x-validate:
        - description: Page number
          in: query
          name: page
          required: false
          schema:
            default: 1
            type: integer
            x-struct:
            x-validate:
        - description: Items per page
          in: query
          name: page_size
          required: false
          schema:
            default: 50
            type: integer
            x-struct:
            x-validate:
        - description: 'Filter by status: success or failed'
          in: query
          name: status
          required: false
          schema:
            type: string
            x-struct:
            x-validate:
        - description: 'Sort column: attempted_at or state'
          in: query
          name: sort_by
          required: false
          schema:
            type: string
            x-struct:
            x-validate:
        - description: 'Sort direction: asc or desc'
          in: query
          name: sort_dir
          required: false
          schema:
            type: string
            x-struct:
            x-validate:
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: false
                description: A paginated list of delivery log entries for a notification channel.
                properties:
                  data:
                    items:
                      additionalProperties: false
                      description: A delivery job log entry for a notification channel.
                      properties:
                        attempted_at:
                          format: date-time
                          nullable: true
                          type: string
                          x-struct:
                          x-validate:
                        errors:
                          items:
                            nullable: true
                            type: string
                            x-struct:
                            x-validate:
                          type: array
                          x-struct:
                          x-validate:
                        event:
                          nullable: true
                          type: string
                          x-struct:
                          x-validate:
                        id:
                          type: integer
                          x-struct:
                          x-validate:
                        inserted_at:
                          format: date-time
                          type: string
                          x-struct:
                          x-validate:
                        status:
                          enum:
                            - success
                            - failed
                          type: string
                          x-struct:
                          x-validate:
                        worker:
                          type: string
                          x-struct:
                          x-validate:
                      required:
                        - id
                        - status
                        - worker
                        - inserted_at
                      title: DeliveryLog
                      type: object
                      x-struct:
                      x-validate:
                    type: array
                    x-struct:
                    x-validate:
                  meta:
                    additionalProperties: false
                    properties:
                      page:
                        type: integer
                        x-struct:
                        x-validate:
                      page_size:
                        type: integer
                        x-struct:
                        x-validate:
                      total_pages:
                        type: integer
                        x-struct:
                        x-validate:
                    type: object
                    x-struct:
                    x-validate:
                title: DeliveryLogList
                type: object
                x-struct:
                x-validate:
          description: Log list
        '404':
          content:
            application/json:
              schema:
                additionalProperties: false
                description: Standard error response.
                properties:
                  error:
                    properties:
                      code:
                        type: string
                        x-struct:
                        x-validate:
                      message:
                        type: string
                        x-struct:
                        x-validate:
                    required:
                      - code
                      - message
                    type: object
                    x-struct:
                    x-validate:
                required:
                  - error
                title: Error
                type: object
                x-struct:
                x-validate:
          description: Channel not found
      summary: List delivery logs
      tags:
        - Delivery Logs
  /api/v1/email_channels/{email_channel_id}/pings:
    post:
      callbacks: {}
      description: Enqueue a test notification to verify the channel is reachable.
      operationId: HolterWeb.Api.EmailChannelController.ping
      parameters:
        - description: Email channel UUID
          in: path
          name: email_channel_id
          required: true
          schema:
            format: uuid
            type: string
            x-struct:
            x-validate:
      responses:
        '202':
          content:
            application/json: {}
          description: Ping enqueued
        '404':
          content:
            application/json:
              schema:
                properties:
                  error:
                    properties:
                      code:
                        type: string
                        x-struct:
                        x-validate:
                      message:
                        type: string
                        x-struct:
                        x-validate:
                    type: object
                    x-struct:
                    x-validate:
                title: Error
                type: object
                x-struct:
                x-validate:
          description: Channel not found
        '422':
          content:
            application/json:
              schema:
                properties:
                  error:
                    properties:
                      code:
                        type: string
                        x-struct:
                        x-validate:
                      message:
                        type: string
                        x-struct:
                        x-validate:
                    type: object
                    x-struct:
                    x-validate:
                title: Error
                type: object
                x-struct:
                x-validate:
          description: No verified recipient on this channel
        '429':
          content:
            application/json:
              schema:
                properties:
                  error:
                    properties:
                      code:
                        type: string
                        x-struct:
                        x-validate:
                      message:
                        type: string
                        x-struct:
                        x-validate:
                    type: object
                    x-struct:
                    x-validate:
                title: Error
